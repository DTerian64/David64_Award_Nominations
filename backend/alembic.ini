# alembic.ini
# -----------
# Run from the backend/ directory:  alembic upgrade head

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Template for new revision files
# file_template = %%(rev)s_%%(slug)s

# Timezone for "Create Date" stamps in migration files
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during alembic --version
# version_path_separator = os  # default: use os.pathsep

# The connection URL is built dynamically in env.py from environment variables
# (SQL_SERVER, SQL_DATABASE, SQL_USER, SQL_PASSWORD, USE_MANAGED_IDENTITY).
# Leave sqlalchemy.url blank — env.py handles it.
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured by default

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
