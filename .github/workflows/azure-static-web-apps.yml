name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main   # → production  (award-nomination-frontend)
      - dev    # → development (award-nomination-frontend-dev)
    paths:
      - 'frontend/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    # Selects the GitHub Environment, which determines which set of secrets is injected.
    # For PRs, github.head_ref is the source branch being merged.
    environment: ${{ (github.ref_name == 'main' || github.base_ref == 'main') && 'production' || 'development' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # VITE_* build variables are set as Azure SWA app_settings by Terraform.
      # Oryx reads app_settings as environment variables at build time, so Vite
      # picks them up via import.meta.env.VITE_* automatically.
      # Terraform is the single source of truth — no GitHub env vars needed.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          output_location: "dist"
          config_file_location: "./frontend"
          api_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    environment: ${{ github.base_ref == 'main' && 'production' || 'development' }}

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
