name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main     # → production    (award-nomination-frontend)
      - sandbox  # → sandbox       (award-nomination-frontend-sandbox)
      - dev      # → development   (award-nomination-frontend-dev)
    paths:
      - 'frontend/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - sandbox
      - dev
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    # Selects the GitHub Environment, which determines which set of secrets/vars is injected.
    # main   → production  |  sandbox → sandbox  |  dev → development
    environment: ${{ (github.ref_name == 'main' || github.base_ref == 'main') && 'production' || (github.ref_name == 'sandbox' || github.base_ref == 'sandbox') && 'sandbox' || 'development' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # Build explicitly so we control the Node version, env vars, and output.
      # Oryx auto-build is skipped (skip_app_build: true) to avoid it serving
      # the raw source instead of the compiled dist/.
      # VITE_* are baked into the bundle at build time via import.meta.env.VITE_*.
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_CLIENT_ID: ${{ vars.VITE_CLIENT_ID }}
          VITE_TENANT_ID: ${{ vars.VITE_TENANT_ID }}
          VITE_API_SCOPE: ${{ vars.VITE_API_SCOPE }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_API_CLIENT_ID: ${{ vars.VITE_API_CLIENT_ID }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          output_location: "dist"
          skip_app_build: true
          api_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    environment: ${{ github.base_ref == 'main' && 'production' || github.base_ref == 'sandbox' && 'sandbox' || 'development' }}

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
