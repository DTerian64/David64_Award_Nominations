name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main     # → production    (award-nomination-frontend)
      - sandbox  # → sandbox       (award-nomination-frontend-sandbox)
      - dev      # → development   (award-nomination-frontend-dev)
    paths:
      - 'frontend/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - sandbox
      - dev
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    # Selects the GitHub Environment, which determines which set of secrets/vars is injected.
    # main   → production  |  sandbox → sandbox  |  dev → development
    environment: ${{ (github.ref_name == 'main' || github.base_ref == 'main') && 'production' || (github.ref_name == 'sandbox' || github.base_ref == 'sandbox') && 'sandbox' || 'development' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # VITE_* build variables are set as GitHub Environment variables by mid-terraform.ps1.
      # The GitHub Actions runner has no access to Azure SWA app_settings at build time —
      # those are Azure-side runtime config only. Values must be passed explicitly here
      # so Vite can bake them in via import.meta.env.VITE_*.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          output_location: "dist"
          config_file_location: "./frontend/public"
          api_location: ""
        env:
          VITE_CLIENT_ID: ${{ vars.VITE_CLIENT_ID }}
          VITE_TENANT_ID: ${{ vars.VITE_TENANT_ID }}
          VITE_API_SCOPE: ${{ vars.VITE_API_SCOPE }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_API_CLIENT_ID: ${{ vars.VITE_API_CLIENT_ID }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    environment: ${{ github.base_ref == 'main' && 'production' || github.base_ref == 'sandbox' && 'sandbox' || 'development' }}

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
