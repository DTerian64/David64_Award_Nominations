name: Sync docs to Azure DevOps wiki

on:
  push:
    branches: [sandbox]
    paths:
      - 'Documentation/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: sandbox
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Azure Repos
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
        run: |
          B64_PAT=$(echo -n ":${ADO_PAT}" | base64 -w 0)
          git remote add devops https://dev.azure.com/Terian-Services/Award_Nomination/_git/Award_Nomination
          git -c http.extraHeader="Authorization: Basic ${B64_PAT}" push devops sandbox