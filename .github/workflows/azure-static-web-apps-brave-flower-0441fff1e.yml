name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main   # → production  (award-nomination-frontend)
      - dev    # → development (award-nomination-frontend-dev)
    paths:
      - 'frontend/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    # Selects the GitHub Environment, which determines which set of secrets is injected.
    # For PRs, github.head_ref is the source branch being merged.
    environment: ${{ (github.ref_name == 'main' || github.base_ref == 'main') && 'production' || 'development' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # All ${{ secrets.* }} below are resolved automatically from the
      # GitHub Environment selected above — no branching needed.
      - name: Install and Build (Vite)
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL:       ${{ secrets.VITE_API_URL }}
          VITE_API_CLIENT_ID: ${{ secrets.VITE_API_CLIENT_ID }}
          VITE_API_SCOPE:     ${{ secrets.VITE_API_SCOPE }}
          VITE_CLIENT_ID:     ${{ secrets.VITE_CLIENT_ID }}
          VITE_TENANT_ID:     ${{ secrets.VITE_TENANT_ID }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend/dist"
          config_file_location: "./frontend/dist"
          output_location: ""
          api_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    environment: ${{ github.base_ref == 'main' && 'production' || 'development' }}

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
